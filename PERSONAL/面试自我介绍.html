<p>我是一名具备 <strong>软硬件全栈开发能力</strong> 的电子信息本科生，长期围绕 <strong>嵌入式系统、模拟/数字电路、FPGA 实时部署、智能测量与工程化系统集成</strong> 开展项目实践；能够从问题定义、方案设计、硬件调试、嵌入式开发、算法训练到系统展示，独立推进完整工程闭环。</p>

<h2 id="03%E6%A0%B8%E5%BF%83%E9%A1%B9%E7%9B%AE%E4%B8%80%E5%9F%BA%E4%BA%8E-fpga-%E7%9A%84%E7%A3%81%E6%82%AC%E6%B5%AE%E6%B0%94%E9%9A%99%E8%BE%A8%E8%AF%86%E4%B8%8E%E6%97%A0%E6%B0%94%E9%9A%99%E4%BC%A0%E6%84%9F%E5%99%A8%E6%8E%A7%E5%88%B6">03｜核心项目一：基于 FPGA 的磁悬浮气隙辨识与无气隙传感器控制</h2>
<p><strong>项目类型</strong>：国家级 SRTP<br />
<strong>时间</strong>：2025.05—2026.05（预计）<br />
<strong>关键词</strong>：磁悬浮｜Zynq SoC｜TCN｜Vitis HLS｜实时控制｜传感器冗余测量<br />
[[项目图片.pdf#page=3&amp;selection=0,0,10,8&amp;color=yellow|项目图片, p.3]]</p>
<h3 id="%E9%A1%B9%E7%9B%AE%E8%83%8C%E6%99%AF">项目背景</h3>
<p>磁悬浮系统对气隙测量与控制实时性要求很高。传统方案依赖气隙传感器，但在成本、可靠性和系统集成方面存在限制。因此，本项目尝试利用电磁信号之间的解析冗余关系，构建 <strong>无气隙传感器的气隙软测量方法</strong>。</p>
<h3 id="%E6%88%91%E7%9A%84%E5%B7%A5%E4%BD%9C">我的工作</h3>
<ul>
<li>设计并调试集成 <strong>Zynq SoC、磁悬浮功率驱动、信号处理前端、ADC 采样电路</strong> 的一体式实验主板。</li>
<li>在多种悬浮工况下采集实验数据，使用 <strong>PyTorch</strong> 训练 TCN 网络，实现气隙高精度辨识。</li>
<li>使用 <strong>Vitis HLS</strong> 将 TCN 模型部署至 Zynq SoC 的 PL 端，实现在线实时推理。</li>
</ul>
<h3 id="%E9%A1%B9%E7%9B%AE%E7%BB%93%E6%9E%9C">项目结果</h3>

<h2 id="04%E6%A0%B8%E5%BF%83%E9%A1%B9%E7%9B%AE%E4%BA%8C%E5%9F%BA%E4%BA%8E%E5%9C%A8%E7%BA%BF%E5%BC%8F-eis-%E6%A3%80%E6%B5%8B%E7%9A%84%E9%94%82%E7%94%B5%E6%B1%A0%E5%AE%89%E5%85%A8%E4%B8%8E%E5%AF%BF%E5%91%BD%E8%AF%84%E4%BC%B0%E7%B3%BB%E7%BB%9F">04｜核心项目二：基于在线式 EIS 检测的锂电池安全与寿命评估系统</h2>
<p><strong>项目类型</strong>：国家级 SRTP<br />
<strong>时间</strong>：2023.12—2025.05<br />
<strong>关键词</strong>：EIS｜锂电池｜STM32｜模拟前端｜SOH 预测｜Flask/Vue3｜IoT<br />
[[项目图片.pdf#page=13&amp;selection=0,0,10,1&amp;color=yellow|项目图片, p.13]]</p>
<h3 id="%E9%A1%B9%E7%9B%AE%E8%83%8C%E6%99%AF-1">项目背景</h3>
<p>锂电池的安全状态和寿命评估对于储能、电动车与嵌入式电源管理都非常关键。EIS（电化学阻抗谱）能够反映电池内部状态，但传统设备成本较高、在线部署难度较大。因此，本项目构建了一个面向在线检测的嵌入式 EIS 测量与寿命评估系统。</p>
<h3 id="%E6%88%91%E7%9A%84%E5%B7%A5%E4%BD%9C-1">我的工作</h3>
<ul>
<li>设计并反复调试 <strong>阻抗测量模拟电路</strong>，提升系统阻抗测量精度。</li>
<li>基于 <strong>STM32 Stellar 系列车规级 MCU</strong> 开展嵌入式系统设计。</li>
<li>使用 <strong>Flask + Vue3</strong> 搭建可视化界面，形成完整的物联网阻抗在线测量系统。</li>
<li>作为队长带队参加第七届全国大学生嵌入式芯片与系统设计竞赛。</li>
</ul>

<p><strong>项目类型</strong>：2025 年全国大学生电子设计竞赛<br />

<strong>关键词</strong>：电赛｜四线电桥｜驻波法｜线缆检测｜阻抗测量｜队长<br />
[[项目图片.pdf#page=22&amp;selection=0,0,0,8&amp;color=yellow|项目图片, p.22]]</p>
<h3 id="%E9%A1%B9%E7%9B%AE%E8%83%8C%E6%99%AF-2">项目背景</h3>
<p>该作品面向以太网双绞线检测场景，需要实现线序识别、线缆类型判断、阻抗测量、线长估计与短路定位等功能。项目在有限时间内完成方案论证、硬件搭建、算法实现与现场测试。</p>
<h3 id="%E6%88%91%E7%9A%84%E5%B7%A5%E4%BD%9C-2">我的工作</h3>

<li>作为队长统筹作品整体方案设计和任务分工。</li>
<li>提出基于 <strong>驻波法</strong> 的线缆长度单端测量方案。</li>
<li>提出采用 <strong>四线精密电桥</strong> 测量导线电阻的方案，并将测量精度校准至 <strong>0.1 mΩ</strong> 级别。</li>
<li>赛前设计并调试关键模块，如四线高精度电桥等。</li>

<h2 id="07--ra%E7%BB%8F%E5%8E%86">07 | RA经历</h2>
<h3 id="%E6%B8%85%E5%8D%8E-tiim-lab%E6%99%B6%E5%9C%86%E7%BC%BA%E9%99%B7%E8%AF%86%E5%88%AB%E4%B8%8E%E6%B7%B1%E5%BA%A6%E5%AD%A6%E4%B9%A0%E5%AE%9E%E9%AA%8C%E5%B9%B3%E5%8F%B0">清华 TIIM LAB｜晶圆缺陷识别与深度学习实验平台</h3>
<p>围绕 <strong>WM-811K 晶圆缺陷数据集</strong>，参与晶圆缺陷模式识别实验，搭建从数据处理、模型训练、评估到可视化分析的完整实验流程。</p>
<ul>
<li>完成 wafer map 数据处理与 PyTorch 训练框架搭建，支持二分类与 9 类缺陷模式分类。</li>
<li>基于 <strong>ResNet18 / ResNet50 / ConvNeXt / EfficientNetV2</strong> 等模型开展对比实验，分析类别不平衡与少数类召回问题。</li>
<li>通过 <strong>Focal Loss、class-balanced sampling、GeM、cRT、logit adjustment</strong> 等方法优化多分类性能，并整理阶段性研究日志与实验结论。</li>
</ul>
<h3 id="%E8%A5%BF%E5%AE%89%E4%BA%A4%E9%80%9A%E5%A4%A7%E5%AD%A6gnss%E4%BF%A1%E5%8F%B7%E6%AC%BA%E9%AA%97%E9%A1%B9%E7%9B%AEfpga%E9%A1%BE%E9%97%AE">西安交通大学｜GNSS信号欺骗项目｜FPGA顾问</h3>

</section>
